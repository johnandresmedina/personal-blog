  </style>
  <rect class="bg" width="32" height="32" rx="6" />
  <rect class="fg" x="7" y="9.7" width="18" height="2.6" rx="1.3" />
  <rect class="fg" x="7" y="14.7" width="18" height="2.6" rx="1.3" />
  <rect class="accent" x="7" y="19.7" width="10" height="2.6" rx="1.3" />
</svg>
